    <style>

            align-items:center;
            height:100vh;
        }

        .card{

        a{
            display:inline-block;
            margin-top:20px;
            color:white;
            text-decoration:none;
            background:#2563eb;
            padding:12px 25px;

        }

        a:hover{
            background:#1d4ed8;
        }
